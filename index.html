<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth WebApp</title>

    <link rel="icon" type="image/png" href="src/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Caveat:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link href="./dist/output.css" rel="stylesheet">

    <script src="./src/script.js" defer></script>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

<div class="curtain curtain-left hidden lg:block"></div>
<div class="curtain curtain-right hidden lg:block"></div>

<div class="text-center mb-12 z-10">
    <h1 class="serif text-6xl text-rose-200 mb-2 drop-shadow-lg">Photobooth</h1>
    <p class="handwritten text-2xl text-rose-400">Filter wählen und Bilder machen :)</p>
</div>

<main class="relative z-10 max-w-6xl w-full flex flex-col lg:flex-row items-center justify-center gap-16">

    <div class="bg-stone-100 p-8 rounded-[3rem] shadow-[0_30px_60px_rgba(0,0,0,0.5)] border-b-[16px] border-stone-300 w-full max-w-xl">

        <div class="camera-screen aspect-[4/3] bg-black rounded-2xl overflow-hidden mb-4">
            <video id="video" autoplay playsinline class="w-full h-full object-cover mirrored"></video>

            <button id="mirrorToggle" class="absolute bottom-4 right-4 w-12 h-12 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30 transition-all z-30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
            </button>

            <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold hidden pointer-events-none z-10"></div>
            <div id="flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-20"></div>
        </div>

        <div class="flex justify-center gap-2 mb-8 bg-stone-200/50 p-2 rounded-2xl">
            <button class="filter-btn active" data-filter="none">Normal</button>
            <button class="filter-btn" data-filter="grayscale(100%)">S/W</button>
            <button class="filter-btn" data-filter="sepia(1) contrast(1.1)">Retro</button>
            <button class="filter-btn" data-filter="contrast(1.2) saturate(1.3) brightness(1.1)">Vivid</button>
        </div>

        <div class="flex flex-col items-center gap-6">
            <button id="startBtn" class="arcade-button w-full py-2 rounded-2xl tracking-widest flex justify-center items-center">
                <img src="src/kameraAuslöser.png" class="size-12 ">
            </button>
            <div id="status" class="h-6 text-stone-500 font-medium tracking-tighter uppercase text-xs">Bereit für Fotos</div>
        </div>
    </div>

    <div class="flex flex-col items-center">
        <div class="photo-slot mb-2"></div>
        <div id="resultArea" class="hidden">
            <div class="photo-strip">
                <img id="finalImage" class="w-64" alt="Dein Fotostreifen">
                <div class="mt-4 text-center">
                    <p class="serif text-rose-300 text-xl">Photobooth</p>
                    <p id="currentDate" class="text-[9px] text-stone-400 font-mono tracking-widest mt-1"></p>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <a id="downloadBtn" class="bg-white px-6 py-3 rounded-xl shadow-md font-bold text-stone-700 hover:bg-stone-50 transition-all cursor-pointer">
                    Fotos herunterladen
                </a>
                <button onclick="window.location.reload()" class="bg-rose-100/20 px-6 py-3 rounded-xl text-rose-200 font-bold hover:bg-rose-100/30 transition-all">
                    Zurücksetzen
                </button>
            </div>
        </div>
    </div>
</main>

<canvas id="canvas" width="600" height="1800" class="hidden"></canvas>
</body>
</html>
